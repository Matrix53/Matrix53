<svg width="495" height="200" viewBox="0 0 495 200"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- card border gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fe428e"/>
      <stop offset="50%"  stop-color="#a9fef7"/>
      <stop offset="100%" stop-color="#f8d847"/>
    </linearGradient>
    <!-- title text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fe428e"/>
      <stop offset="100%" stop-color="#a9fef7"/>
    </linearGradient>
    <!-- soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .lbl { font: 11px 'Segoe UI',Ubuntu,sans-serif; fill:#a9fef7; opacity:.8; }
      .val { font: bold 20px 'Segoe UI',Ubuntu,sans-serif; fill:#f8d847; }
    </style>
  </defs>

  <!-- gradient border -->
  <rect width="495" height="200" rx="13" ry="13" fill="url(#grad)"/>
  <!-- dark card body -->
  <rect x="1.5" y="1.5" width="492" height="197" rx="12" ry="12" fill="#141321"/>
  <!-- subtle top highlight -->
  <rect x="1.5" y="1.5" width="492" height="40" rx="12" ry="12" fill="#ffffff" fill-opacity="0.03"/>

  <!-- title with glow -->
  <text x="247" y="36"
        text-anchor="middle"
        font="bold 15px 'Segoe UI',Ubuntu,sans-serif"
        fill="url(#titleGrad)"
        filter="url(#glow)">Matrix53's GitHub Stats</text>

  <!-- title underline -->
  <line x1="22" y1="46" x2="473" y2="46"
        stroke="url(#grad)" stroke-opacity="0.25" stroke-width="1"/>

  <!-- stat blocks -->
  <g transform="translate(22,60)">
    <circle cx="14" cy="14" r="14" fill="#fe428e" fill-opacity="0.12"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-family="'Segoe UI Emoji',sans-serif">⭐</text>
    <text x="36" y="11" class="lbl">Total Stars</text>
    <text x="36" y="29" class="val">130</text>
  </g>
  <g transform="translate(187,60)">
    <circle cx="14" cy="14" r="14" fill="#fe428e" fill-opacity="0.12"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-family="'Segoe UI Emoji',sans-serif">🔀</text>
    <text x="36" y="11" class="lbl">Total Commits</text>
    <text x="36" y="29" class="val">1.6k</text>
  </g>
  <g transform="translate(352,60)">
    <circle cx="14" cy="14" r="14" fill="#fe428e" fill-opacity="0.12"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-family="'Segoe UI Emoji',sans-serif">🔖</text>
    <text x="36" y="11" class="lbl">Total PRs</text>
    <text x="36" y="29" class="val">28</text>
  </g>
  <g transform="translate(22,130)">
    <circle cx="14" cy="14" r="14" fill="#fe428e" fill-opacity="0.12"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-family="'Segoe UI Emoji',sans-serif">🐛</text>
    <text x="36" y="11" class="lbl">Total Issues</text>
    <text x="36" y="29" class="val">18</text>
  </g>
  <g transform="translate(187,130)">
    <circle cx="14" cy="14" r="14" fill="#fe428e" fill-opacity="0.12"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-family="'Segoe UI Emoji',sans-serif">📦</text>
    <text x="36" y="11" class="lbl">Total Repos</text>
    <text x="36" y="29" class="val">24</text>
  </g>
  <g transform="translate(352,130)">
    <circle cx="14" cy="14" r="14" fill="#fe428e" fill-opacity="0.12"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-family="'Segoe UI Emoji',sans-serif">🤝</text>
    <text x="36" y="11" class="lbl">Contributed to</text>
    <text x="36" y="29" class="val">31</text>
  </g>

  <!-- footer -->
  <line x1="22" y1="178" x2="473" y2="178"
        stroke="#a9fef7" stroke-opacity="0.1" stroke-width="1"/>
  <text x="247" y="192"
        text-anchor="middle"
        font="10px 'Segoe UI',Ubuntu,sans-serif"
        fill="#a9fef7" opacity="0.35">All-time stats · Updated by GitHub Actions</text>
</svg>
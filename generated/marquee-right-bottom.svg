<svg width="132" height="200"
     viewBox="0 0 132 200"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Project marquee bottom">
  <defs>
    <style>
      .lane-shell { fill: transparent; }
      .lane-chip rect.chip-bg {
        fill: #ffffff;
        fill-opacity: 0.94;
        stroke: #d7dbe8;
        stroke-width: 1;
      }
      .lane-chip circle.icon-ring {
        fill: #f5f7fd;
        stroke: #dbe3f1;
        stroke-width: 0.9;
      }
      .lane-chip image.logo-icon,
      .lane-chip image.emoji-icon {
        overflow: visible;
      }
      .lane-chip text.label {
        font: 600 8.6px 'Segoe UI', Ubuntu, sans-serif;
        fill: #1f2937;
        dominant-baseline: middle;
      }
    </style>
    <clipPath id="lane-clip-project-marquee-bottom">
      <rect width="132" height="200" rx="12" ry="12" />
    </clipPath>
  </defs>

  <g class="lane-shell" data-slot="0" clip-path="url(#lane-clip-project-marquee-bottom)">
  <g class="lane-chip" data-index="0" opacity="0">
    <animateTransform attributeName="transform"
                      type="translate"
                      values="-132 0; 6 0"
                      dur="18.0s"
                      begin="-0.0s"
                      repeatCount="indefinite" />
    <animate attributeName="opacity"
             values="0;1;1;0.18;0"
             keyTimes="0;0.16;0.72;0.88;1"
             dur="18.0s"
             begin="-0.0s"
             repeatCount="indefinite" />
        <g transform="translate(0 89)" class="chip-content">
      <rect class="chip-bg" rx="11" ry="11" width="120" height="22" />
      <circle class="icon-ring" cx="14" cy="11" r="8" />
      <image class="emoji-icon" href="data:image/svg+xml;base64," x="7" y="4" width="14" height="14" preserveAspectRatio="xMidYMid meet" />
      <text class="label" x="28" y="11.2" textLength="84" lengthAdjust="spacingAndGlyphs">Mario</text>
    </g>
  </g>
